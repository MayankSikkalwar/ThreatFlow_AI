# Phase 1 infrastructure for the AI-powered SIEM + SOAR PRD.
# PRD-compliant data flow:
# 1. The Python generator writes newline-delimited JSON events into /logs/*.log.
# 2. Filebeat tails those files and forwards the same JSON events to Kafka.
# 3. Kafka acts as a buffer between shippers and processors so bursts do not block the generator.
# 4. Logstash consumes the raw-logs topic, preserves @timestamp, and renames message to raw_log.
# 5. Kibana reads indexed documents from Elasticsearch and uses @timestamp for time-based views.
version: '3.8'

services:

  # =========================
  # ZOOKEEPER
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: siem-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  # =========================
  # KAFKA
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: siem-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24

      # Dual listeners (CRITICAL for Docker + host communication)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12

  # =========================
  # ELASTICSEARCH
  # =========================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: siem-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"   # optimized for your 8GB system
    ports:
      - "9300:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # =========================
  # KIBANA
  # =========================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: siem-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy   # ensures ES is fully ready
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5602:5601"

  # =========================
  # LOGSTASH
  # =========================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: siem-logstash
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.monitoring.enabled: "false"
    ports:
      - "9600:9600"
    volumes:
      - ./infra/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro

  # =========================
  # FILEBEAT
  # =========================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: siem-filebeat
    user: root
    restart: unless-stopped
    depends_on:
      - kafka
      - log-generator
    command: ["filebeat", "-e", "-strict.perms=false"]
    volumes:
      - ./infra/elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/logs
      - filebeat-data:/usr/share/filebeat/data

  # =========================
  # LOG GENERATOR
  # =========================
  log-generator:
    build:
      context: ./log-generator
    container_name: siem-log-generator
    restart: unless-stopped
    environment:
      LOG_DIRECTORY: /logs
      SCENARIO_PAUSE_SECONDS: 5
    volumes:
      - ./logs:/logs

# =========================
# VOLUMES
# =========================
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  elasticsearch-data:
  filebeat-data:
