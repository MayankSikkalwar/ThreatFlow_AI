# Filebeat is intentionally used ahead of Kafka instead of sending directly from the generator.
# That keeps the generator focused on producing local append-only audit logs while Filebeat
# handles file tailing and transport into Kafka.
#
# @timestamp is required because Elasticsearch and Kibana both use it as the canonical
# event-time field for indexing, sorting, and time-based visualizations.

input {
  kafka {
    # Kafka buffers Filebeat traffic before Logstash indexes it into Elasticsearch.
    bootstrap_servers => "kafka:29092"
    topics => ["raw-logs"]
    group_id => "siem-logstash"
    client_id => "siem-logstash-consumer"
    codec => json
    auto_offset_reset => "earliest"
  }
}

filter {
  # The generator writes @timestamp directly, so Logstash only needs to parse and preserve it.
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    # Preserve the original log body in the PRD-aligned raw_log field.
    rename => { "message" => "raw_log" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
